name: Publish Windows Release Asset

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        shell: bash
        run: |
          VERSION=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Windows binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $zip = "dist/Stellar.Wing.Windows.x86_64.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive `
            -Path "target/x86_64-pc-windows-msvc/release/stellar-wing.exe" `
            -DestinationPath $zip `
            -Force

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "v${VERSION}" "dist/Stellar.Wing.Windows.x86_64.zip" --clobber
